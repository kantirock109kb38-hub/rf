name: Refresh social gallery

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh gallery from social profile
        run: npm run gallery:refresh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram-posts.json images/gallery/ index.html
          git diff --staged --quiet || git commit -m "chore: auto-refresh homepage social gallery [skip ci]"
          git push
