<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login | RF Flanges</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <img src="/images/logo.jpg" alt="Ramdevra Forge">
      <h1>Admin Panel</h1>
      <p>Sign in to manage blog posts and track leads</p>
      <div id="login-alert" class="admin-alert admin-alert-error" style="display:none"></div>
      <form id="login-form">
        <div class="admin-form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@example.com">
        </div>
        <div class="admin-form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;justify-content:center">
          <i class="fa fa-sign-in"></i> Sign In
        </button>
      </form>
      <p style="margin-top:20px;font-size:12px;color:#999;text-align:center">
        <a href="/" style="color:#0d9243">← Back to website</a>
      </p>
    </div>
  </div>
  <script src="/js/config.js"></script>
  <script type="module" src="/admin/admin-auth.js"></script>
</body>
</html>
