<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard | RF Flanges Admin</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/tinymce@7.6.0/tinymce.min.js"></script>
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <h2>RF Flanges</h2>
        <small>Admin Panel</small>
      </div>
      <ul class="admin-nav">
        <li><a href="#" data-tab="leads" class="active"><i class="fa fa-users"></i> Leads</a></li>
        <li><a href="#" data-tab="blogs"><i class="fa fa-file-text"></i> Blog Posts</a></li>
        <li><a href="#" data-tab="editor" id="nav-editor" style="display:none"><i class="fa fa-pencil"></i> Editor</a></li>
      </ul>
      <div class="admin-sidebar-footer">
        <button id="logout-btn" class="admin-btn admin-btn-secondary" style="width:100%;justify-content:center">
          <i class="fa fa-sign-out"></i> Logout
        </button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1 id="page-title">Lead Dashboard</h1>
        <span id="admin-email" style="font-size:13px;color:#888"></span>
      </header>

      <div class="admin-content">
        <!-- LEADS TAB -->
        <div id="tab-leads" class="admin-tab-content active">
          <div class="admin-stats" id="lead-stats">
            <div class="admin-stat-card highlight">
              <div class="label">Today</div>
              <div class="value" id="stat-today">—</div>
            </div>
            <div class="admin-stat-card">
              <div class="label">This Week</div>
              <div class="value" id="stat-week">—</div>
            </div>
            <div class="admin-stat-card">
              <div class="label">This Month</div>
              <div class="value" id="stat-month">—</div>
            </div>
            <div class="admin-stat-card">
              <div class="label">New (Uncontacted)</div>
              <div class="value" id="stat-new">—</div>
            </div>
          </div>

          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2>All Leads</h2>
              <div class="admin-filter-bar">
                <select id="lead-date-filter">
                  <option value="today">Today</option>
                  <option value="week">This Week</option>
                  <option value="month">This Month</option>
                  <option value="all" selected>All Time</option>
                </select>
                <select id="lead-status-filter">
                  <option value="">All Statuses</option>
                  <option value="new">New</option>
                  <option value="contacted">Contacted</option>
                  <option value="qualified">Qualified</option>
                  <option value="closed">Closed</option>
                  <option value="spam">Spam</option>
                </select>
                <button class="admin-btn admin-btn-secondary" id="export-leads-btn">
                  <i class="fa fa-download"></i> Export CSV
                </button>
              </div>
            </div>
            <div class="admin-panel-body admin-table-wrap">
              <table class="admin-table" id="leads-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="leads-tbody">
                  <tr><td colspan="7" class="admin-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- BLOGS LIST TAB -->
        <div id="tab-blogs" class="admin-tab-content">
          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2>Blog Posts</h2>
              <button class="admin-btn admin-btn-primary" id="new-post-btn">
                <i class="fa fa-plus"></i> New Post
              </button>
            </div>
            <div class="admin-panel-body admin-table-wrap">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Published</th>
                    <th>Updated</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="posts-tbody">
                  <tr><td colspan="5" class="admin-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- BLOG EDITOR TAB -->
        <div id="tab-editor" class="admin-tab-content">
          <div class="admin-panel">
            <div class="admin-panel-header">
              <h2 id="editor-title">New Blog Post</h2>
              <div style="display:flex;gap:8px">
                <button class="admin-btn admin-btn-secondary" id="cancel-edit-btn">Cancel</button>
                <button class="admin-btn admin-btn-primary" id="save-draft-btn">Save Draft</button>
                <button class="admin-btn admin-btn-primary" id="publish-btn">
                  <i class="fa fa-globe"></i> Publish
                </button>
              </div>
            </div>
            <div class="admin-panel-body">
              <div id="editor-alert" class="admin-alert" style="display:none"></div>
              <div class="admin-editor-layout">
                <div>
                  <div class="admin-form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" placeholder="Blog post title">
                  </div>
                  <div class="admin-form-group">
                    <label for="post-slug">URL Slug</label>
                    <input type="text" id="post-slug" placeholder="auto-generated-from-title">
                  </div>
                  <div class="admin-form-group">
                    <label>Content</label>
                    <textarea id="blog-editor"></textarea>
                  </div>
                </div>
                <div class="admin-editor-sidebar">
                  <div class="admin-form-group">
                    <label for="post-excerpt">Excerpt</label>
                    <textarea id="post-excerpt" rows="4" placeholder="Short summary for listing page"></textarea>
                  </div>
                  <div class="admin-form-group">
                    <label for="post-author">Author</label>
                    <input type="text" id="post-author" value="Ramdevra Forge">
                  </div>
                  <div class="admin-form-group">
                    <label for="post-cover">Cover Image URL</label>
                    <input type="text" id="post-cover" placeholder="https://…">
                  </div>
                  <div class="admin-form-group">
                    <label>Upload Cover Image</label>
                    <input type="file" id="cover-upload" accept="image/*">
                  </div>
                  <div id="cover-preview" style="margin-top:8px"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lead detail modal (simple) -->
  <div id="lead-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;border-radius:8px;max-width:560px;width:100%;padding:24px;max-height:90vh;overflow-y:auto">
      <h3 style="margin-top:0">Lead Details</h3>
      <div id="lead-modal-body"></div>
      <div class="admin-form-group" style="margin-top:16px">
        <label>Status</label>
        <select id="lead-modal-status">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option>
          <option value="closed">Closed</option>
          <option value="spam">Spam</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label>Notes</label>
        <textarea id="lead-modal-notes" rows="3"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="admin-btn admin-btn-primary" id="lead-modal-save">Save</button>
        <button class="admin-btn admin-btn-secondary" id="lead-modal-close">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script type="module" src="/admin/admin-dashboard.js"></script>
</body>
</html>
